name: smart_excuse_ai
description: SmartExcuse AI - Generate clever excuses with AI
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Share & Clipboard
  share_plus: ^7.2.1
  
  # Ads
  google_mobile_ads: ^4.0.0
  
  # UI
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  
  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
